name: Update Packagist

on:
  push:
    branches:
      - master

jobs:
  update-packagist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update package version
        run: |
          COMMIT_MSG=$(git log -1 --format=%s)
          echo "Pushed: $COMMIT_MSG"