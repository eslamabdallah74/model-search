name: Update Packagist

on:
  push:
    branches:
      - master

jobs:
  update-packagist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Trigger Packagist Webhook
        run: |
          curl -s -X POST "https://packagist.org/api/update-package" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u eslam-abass:${{ secrets.PACKAGIST_TOKEN }} \
            -d '{"repository":{"url":"https://github.com/eslamabdallah74/model-search"}}'