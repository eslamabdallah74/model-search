name: Update Packagist

on:
  push:
    branches:
      - master
      - main

jobs:
  update-packagist:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Packagist Update
        env:
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          if [ -n "$PACKAGIST_TOKEN" ]; then
            curl -X POST "https://packagist.org/api/update-package?username=eslam-abass&api_token=$PACKAGIST_TOKEN" \
              -H "Accept: application/json" \
              -d "repository=https://github.com/eslamabdallah74/model-search"
          else
            echo "Packagist token not configured. Set PACKAGIST_TOKEN secret."
            exit 1
          fi